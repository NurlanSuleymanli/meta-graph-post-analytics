<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Graph API — Post Performance Dashboard</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-primary: #0a0b10;
            --bg-secondary: #12131a;
            --bg-glass: rgba(18, 19, 26, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-primary: #8a2be2;
            --accent-secondary: #da1b60;
            --accent-gradient: linear-gradient(135deg, #8a2be2 0%, #da1b60 100%);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(218, 27, 96, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .brand-section h1 {
            font-size: 2rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .brand-section p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .badge-live {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-live::before {
            content: '';
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        /* Error Message Alert */
        .error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--text-main);
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: shake 0.5s ease-in-out;
        }

        .error-banner span {
            font-weight: 500;
        }

        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        @media (min-width: 992px) {
            .dashboard-grid {
                grid-template-columns: 2fr 1fr;
            }
        }

        /* Card Base Styling */
        .card {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Summary Card */
        .summary-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.1) 0%, rgba(218, 27, 96, 0.05) 100%);
            border: 1px solid rgba(138, 43, 226, 0.2);
            position: relative;
            overflow: hidden;
        }

        .summary-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.2) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .summary-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-secondary);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .summary-text {
            font-size: 1.15rem;
            line-height: 1.7;
            font-weight: 500;
            color: var(--text-main);
            z-index: 1;
            position: relative;
        }

        /* Top Posts Layout */
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title span.emoji {
            font-size: 1.5rem;
        }

        .top-posts-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .top-posts-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .post-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .post-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .post-rank {
            background: var(--accent-gradient);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .post-caption {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-main);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-weight: 400;
            min-height: 85px;
        }

        .post-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .stat-item .stat-value {
            color: var(--text-main);
            font-weight: 700;
        }

        .engagement-badge {
            background: rgba(218, 27, 96, 0.1);
            color: var(--accent-secondary);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
        }

        /* Analytics Chart Container */
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
            margin-top: 10px;
        }

        /* Hour Chart Full Row */
        .card-full {
            grid-column: 1 / -1;
        }

        .chart-container-large {
            position: relative;
            width: 100%;
            height: 280px;
            margin-top: 10px;
        }

        .hour-peak-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(138, 43, 226, 0.12);
            border: 1px solid rgba(138, 43, 226, 0.25);
            color: #c084fc;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            margin-left: 12px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% {
                box-shadow: 0 0 0 8px rgba(16, 185, 129, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Header -->
        <header>
            <div class="brand-section">
                <h1>Meta Graph Analysis</h1>
                <p>Dynamic dashboard for Instagram post performance</p>
            </div>
            <div class="badge-live">
                Local Mode
            </div>
        </header>

        <!-- Error Alert (If Any) -->
        <div class="error-banner" th:if="${errorMessage}">
            <span>⚠️</span>
            <span th:text="${errorMessage}">Error Message Here</span>
        </div>

        <div class="dashboard-grid" th:if="${analysis}">
            
            <!-- Summary Dashboard Card -->
            <div class="card summary-card">
                <div class="summary-header">Analysis Result</div>
                <div class="summary-text" th:text="${analysis.summary}">
                    Loading analysis summary...
                </div>
            </div>

            <!-- Left Panel: Top 3 Engagement Posts -->
            <div class="card">
                <h2 class="section-title">
                    <span class="emoji">🏆</span> Top 3 Engagement Posts
                </h2>
                
                <div class="top-posts-container">
                    <div class="post-card" th:each="post, iterStat : ${analysis.topEngagementPosts}">
                        <div>
                            <div class="post-rank" th:text="${iterStat.count}">1</div>
                            <p class="post-caption" th:text="${post.caption != null && !post.caption.isEmpty() ? post.caption : 'No caption'}">
                                Post caption placeholder...
                            </p>
                        </div>
                        
                        <div class="post-meta">
                            <div class="stat-item">
                                <span>❤️</span>
                                <span class="stat-value" th:text="${post.likeCount}">0</span>
                            </div>
                            <div class="stat-item">
                                <span>💬</span>
                                <span class="stat-value" th:text="${post.commentsCount}">0</span>
                            </div>
                            <span class="engagement-badge" th:text="${'ENG: ' + post.engagement}">
                                ENG: 12
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Likes by Day Chart -->
            <div class="card">
                <h2 class="section-title">
                    <span class="emoji">📊</span> Likes by Day of the Week
                </h2>
                <div class="chart-container">
                    <canvas id="likesChart"></canvas>
                </div>
            </div>

            <!-- Full Width: Likes by Hour Chart -->
            <div class="card card-full">
                <h2 class="section-title">
                    <span class="emoji">🕐</span> Likes by Hour of Day
                    <span class="hour-peak-badge" id="peakHourBadge">⚡ Peak Hour: —</span>
                </h2>
                <div class="chart-container-large">
                    <canvas id="likesHourChart"></canvas>
                </div>
            </div>

        </div>

    </div>

    <!-- Thymeleaf inline block to pass map to JavaScript safely -->
    <script th:inline="javascript" th:if="${analysis}">
        /*<![CDATA[*/

        // ── Likes by Day Chart ───────────────────────────────────────────
        const likesByDayMap = /*[[${analysis.likesByDay}]]*/ {};
        const dayLabels     = Object.keys(likesByDayMap);
        const dayValues     = Object.values(likesByDayMap);

        const ctxDay = document.getElementById('likesChart').getContext('2d');
        new Chart(ctxDay, {
            type: 'bar',
            data: {
                labels: dayLabels,
                datasets: [{
                    label: 'Total Likes',
                    data: dayValues,
                    backgroundColor: 'rgba(138, 43, 226, 0.65)',
                    borderColor: '#8a2be2',
                    borderWidth: 1.5,
                    borderRadius: 8,
                    borderSkipped: false,
                    hoverBackgroundColor: 'rgba(218, 27, 96, 0.85)',
                    hoverBorderColor: '#da1b60'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#12131a',
                        titleColor: '#f3f4f6',
                        bodyColor: '#9ca3af',
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 1,
                        padding: 12,
                        cornerRadius: 10,
                        displayColors: false
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: '#9ca3af', font: { family: 'Plus Jakarta Sans', size: 11 } }
                    },
                    y: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#9ca3af', font: { family: 'Plus Jakarta Sans', size: 11 }, precision: 0 }
                    }
                }
            }
        });

        // ── Likes by Hour Chart ──────────────────────────────────────────
        const likesByHourMap = /*[[${analysis.likesByHour}]]*/ {};

        // Build full 0-23 hour axis even if some hours have no data
        const hourLabels = Array.from({length: 24}, (_, i) => i + ':00');
        const hourValues = Array.from({length: 24}, (_, i) => likesByHourMap[i] || 0);

        // Find peak hour for badge
        const peakIdx   = hourValues.indexOf(Math.max(...hourValues));
        const peakLabel = hourLabels[peakIdx];
        document.getElementById('peakHourBadge').textContent = '⚡ Peak Hour: ' + peakLabel;

        const ctxHour = document.getElementById('likesHourChart').getContext('2d');

        // Gradient fill
        const gradient = ctxHour.createLinearGradient(0, 0, 0, 280);
        gradient.addColorStop(0,   'rgba(138, 43, 226, 0.45)');
        gradient.addColorStop(1,   'rgba(138, 43, 226, 0.0)');

        new Chart(ctxHour, {
            type: 'line',
            data: {
                labels: hourLabels,
                datasets: [{
                    label: 'Likes',
                    data: hourValues,
                    fill: true,
                    backgroundColor: gradient,
                    borderColor: '#8a2be2',
                    borderWidth: 2.5,
                    pointRadius: 4,
                    pointBackgroundColor: '#da1b60',
                    pointBorderColor: '#0a0b10',
                    pointBorderWidth: 2,
                    pointHoverRadius: 7,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#12131a',
                        titleColor: '#f3f4f6',
                        bodyColor: '#9ca3af',
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 1,
                        padding: 12,
                        cornerRadius: 10,
                        displayColors: false,
                        callbacks: {
                            title: (items) => 'Hour: ' + items[0].label,
                            label: (item)  => 'Likes: ' + item.raw
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.03)' },
                        ticks: {
                            color: '#9ca3af',
                            font: { family: 'Plus Jakarta Sans', size: 10 },
                            maxTicksLimit: 12
                        }
                    },
                    y: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#9ca3af', font: { family: 'Plus Jakarta Sans', size: 11 }, precision: 0 }
                    }
                }
            }
        });

        /*]]>*/
    </script>
</body>
</html>
